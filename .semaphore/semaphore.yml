version: v1.0
name: Build and deploy
agent:
  machine:
    type: f1-standard-4
    os_image: ubuntu2404
global_job_config:
  env_vars:
    - name: FLUTTER_VERSION
      value: 3.32.0
blocks:
  - name: Prep bccm version
    dependencies: []
    task:
      jobs:
        - name: Compute bccm versionCode
          commands:
            - checkout
            - sem-version ruby 3.2
            - cp /home/semaphore/google-play-service-account.json android/fastlane/google-play-service-account.json
            - cd android
            - bundle install
            - bundle exec fastlane next_version_code
            - export BUILD_NUMBER=$(cat fastlane/.next_version_code)
            - test -n "$BUILD_NUMBER" && test "$BUILD_NUMBER" -gt 0
            - echo "$BUILD_NUMBER" > /tmp/bccm_build_number
            - artifact push workflow /tmp/bccm_build_number -d bccm_build_number
      secrets:
        - name: android-play-store-api-linux
    run:
      when: branch = 'master'
  - name: Build bccm Android
    dependencies:
      - Prep bccm version
    task:
      prologue:
        commands:
          - checkout
          - git submodule update --init --recursive
          - echo "$BCCMEDIA_ENV_DART_BASE64" | base64 -d > lib/env/.env.dart
          - sem-version java 17
          - cache restore flutter-sdk-linux-$FLUTTER_VERSION
          - |
            if [ ! -d "$HOME/flutter" ]; then
              wget -q https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_${FLUTTER_VERSION}-stable.tar.xz -O /tmp/flutter.tar.xz
              tar xf /tmp/flutter.tar.xz -C $HOME
            fi
          - cache store flutter-sdk-linux-$FLUTTER_VERSION $HOME/flutter
          - 'export PATH="$HOME/flutter/bin:$PATH"'
          - flutter --version
          - export ANDROID_HOME="$HOME/android-sdk"
          - cache restore android-sdk
          - |
            if [ ! -d "$ANDROID_HOME/platforms/android-36" ]; then
              mkdir -p "$ANDROID_HOME/cmdline-tools"
              curl -sSL -o /tmp/cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
              unzip -q /tmp/cmdline-tools.zip -d "$ANDROID_HOME/cmdline-tools"
              mv "$ANDROID_HOME/cmdline-tools/cmdline-tools" "$ANDROID_HOME/cmdline-tools/latest"
              yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null
              "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platform-tools" "platforms;android-36" "build-tools;36.0.0"
            fi
          - cache store android-sdk $ANDROID_HOME
          - 'export PATH="$ANDROID_HOME/platform-tools:$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"'
      jobs:
        - name: Build AAB
          commands:
            - artifact pull workflow bccm_build_number
            - export BUILD_NUMBER=$(cat bccm_build_number)
            - echo "Building with versionCode=$BUILD_NUMBER"
            - keystore_path="$(pwd)/android/app/upload-keystore.jks"
            - echo "$KEYSTORE_FILE" | base64 -d > "$keystore_path"
            - |
              cat > android/key.properties << EOF
              storePassword=$KEYSTORE_PASSWORD
              keyPassword=$KEY_PASSWORD
              keyAlias=$KEY_ALIAS
              storeFile=$keystore_path
              EOF
            - 'cache restore pub-linux-$SEMAPHORE_GIT_BRANCH-$(checksum pubspec.yaml),pub-linux-$(checksum pubspec.yaml),pub-linux'
            - make pubgetall
            - cache store pub-linux-$SEMAPHORE_GIT_BRANCH-$(checksum pubspec.yaml) $HOME/.pub-cache
            - flutter build appbundle --release --flavor prod -t lib/main_prod.dart --build-number=$BUILD_NUMBER
            - artifact push workflow build/app/outputs/bundle/prodRelease/app-prod-release.aab -d bccm.aab
      secrets:
        - name: android-keystore-bcc-media-apps
        - name: bccmedia-env-dart
  - name: Deploy bccm Android
    dependencies:
      - Build bccm Android
    run:
      when: branch = 'master'
    task:
      jobs:
        - name: Upload to Play (internal + beta)
          commands:
            - checkout
            - sem-version ruby 3.2
            - cp /home/semaphore/google-play-service-account.json android/fastlane/google-play-service-account.json
            - mkdir -p build/app/outputs/bundle/prodRelease
            - artifact pull workflow bccm.aab
            - mv bccm.aab build/app/outputs/bundle/prodRelease/app-prod-release.aab
            - artifact pull workflow bccm_build_number
            - export BUILD_NUMBER=$(cat bccm_build_number)
            - cd android
            - bundle install
            - bundle exec fastlane upload
      secrets:
        - name: android-play-store-api-linux
  - name: Prep bccm iOS version
    dependencies: []
    task:
      jobs:
        - name: Compute bccm iOS build number
          commands:
            - checkout
            - sem-version ruby 3.2
            - cd ios
            - bundle install
            - bundle exec fastlane next_build_number
            - export BUILD_NUMBER=$(cat fastlane/.next_build_number)
            - test -n "$BUILD_NUMBER" && test "$BUILD_NUMBER" -gt 0
            - echo "$BUILD_NUMBER" > /tmp/bccm_ios_build_number
            - artifact push workflow /tmp/bccm_ios_build_number -d bccm_ios_build_number
      secrets:
        - name: bccmedia-testflight-api
  - name: Build bccm iOS
    dependencies:
      - Prep bccm iOS version
    task:
      agent:
        machine:
          type: a2-standard-4
          os_image: macos-xcode26
      prologue:
        commands:
          - checkout
          - git submodule update --init --recursive
          - echo "$BCCMEDIA_ENV_DART_BASE64" | base64 -d > lib/env/.env.dart
          - cache restore flutter-sdk-macos-$FLUTTER_VERSION
          - |
            if [ ! -d "$HOME/flutter" ]; then
              curl -sSL -o /tmp/flutter.tar.xz https://storage.googleapis.com/flutter_infra_release/releases/stable/macos/flutter_macos_${FLUTTER_VERSION}-stable.tar.xz
              tar xf /tmp/flutter.tar.xz -C $HOME
            fi
          - cache store flutter-sdk-macos-$FLUTTER_VERSION $HOME/flutter
          - 'export PATH="$HOME/flutter/bin:$PATH"'
          - flutter --version
      jobs:
        - name: Build IPA
          commands:
            - artifact pull workflow bccm_ios_build_number
            - export BUILD_NUMBER=$(cat bccm_ios_build_number)
            - echo "Building with iOS build number=$BUILD_NUMBER"
            - echo "$CERTIFICATE_P12_BASE64" | base64 -d > /tmp/certificate.p12
            - security create-keychain -p "" build.keychain
            - security import /tmp/certificate.p12 -k ~/Library/Keychains/build.keychain-db -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
            - security list-keychains -s ~/Library/Keychains/build.keychain-db
            - security default-keychain -s ~/Library/Keychains/build.keychain-db
            - security unlock-keychain -p "" ~/Library/Keychains/build.keychain-db
            - security set-keychain-settings ~/Library/Keychains/build.keychain-db
            - 'security set-key-partition-list -S apple-tool:,apple: -s -k "" ~/Library/Keychains/build.keychain-db'
            - 'export CODE_SIGN_IDENTITY=$(security find-identity -v -p codesigning | grep -o ''"[^"]*"'' | head -1 | tr -d ''"'')'
            - 'echo "Signing identity: $CODE_SIGN_IDENTITY"'
            - mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
            - echo "$PROVISIONING_PROFILE_BASE64" | base64 -d > "$HOME/Library/MobileDevice/Provisioning Profiles/profile.mobileprovision"
            - export PROVISIONING_PROFILE_UUID=$(security cms -D -i "$HOME/Library/MobileDevice/Provisioning Profiles/profile.mobileprovision" | grep -A 1 "UUID" | grep -o '<string>.*</string>' | sed 's/<string>\(.*\)<\/string>/\1/')
            - 'echo "Provisioning profile UUID: $PROVISIONING_PROFILE_UUID"'
            - echo "CODE_SIGN_STYLE = Manual" >> ios/Flutter/Release.xcconfig
            - echo "PROVISIONING_PROFILE = $PROVISIONING_PROFILE_UUID" >> ios/Flutter/Release.xcconfig
            - echo "CODE_SIGN_IDENTITY = $CODE_SIGN_IDENTITY" >> ios/Flutter/Release.xcconfig
            - 'cache restore pub-macos-$SEMAPHORE_GIT_BRANCH-$(checksum pubspec.yaml),pub-macos-$(checksum pubspec.yaml),pub-macos'
            - make pubgetall
            - cache store pub-macos-$SEMAPHORE_GIT_BRANCH-$(checksum pubspec.yaml) $HOME/.pub-cache
            - 'cache restore cocoapods-$SEMAPHORE_GIT_BRANCH-$(checksum ios/Podfile.lock),cocoapods-$(checksum ios/Podfile.lock),cocoapods'
            - 'export DART_VM_OPTIONS="--old_gen_heap_size=6144"'
            - flutter build ipa --release --flavor prod -t lib/main_prod.dart --build-number=$BUILD_NUMBER --export-options-plist=ios/ExportOptions.plist
            - cache store cocoapods-$SEMAPHORE_GIT_BRANCH-$(checksum ios/Podfile.lock) ~/Library/Caches/CocoaPods ios/Pods
            - artifact push workflow build/ios/ipa/bccm.ipa -d bccm.ipa
      secrets:
        - name: ios-signing-certs
        - name: bccmedia-env-dart
  - name: Deploy bccm iOS
    dependencies:
      - Build bccm iOS
    run:
      when: branch = 'master'
    task:
      jobs:
        - name: Upload to TestFlight (internal + Beta)
          commands:
            - checkout
            - sem-version ruby 3.2
            - mkdir -p build/ios/ipa
            - artifact pull workflow bccm.ipa
            - mv bccm.ipa build/ios/ipa/bccm.ipa
            - cd ios
            - bundle install
            - bundle exec fastlane testflight
      secrets:
        - name: bccmedia-testflight-api
